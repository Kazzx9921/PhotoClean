name: PhotoClean
options:
  bundleIdPrefix: com.geekaz
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic

schemes:
  PhotoClean:
    build:
      targets:
        PhotoClean: all
    run:
      storeKitConfiguration: PhotoClean.storekit

targets:
  PhotoClean:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PhotoClean
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.geekaz.PhotoClean
        MARKETING_VERSION: "1.0.2"
        CURRENT_PROJECT_VERSION: "3"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "PhotoClean needs access to your library to help you clean up photos. Nothing leaves your device."
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_CFBundleDisplayName: "PhotoClean"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
